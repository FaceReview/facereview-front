<!doctype html>
<html lang="ko-KR" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png?v=2" />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#15151d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="FaceReview - 영상을 보며 느끼는 감정을 분석하고 공유하세요" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FaceReview" />
    <meta
      property="og:description"
      content="영상을 보며 느끼는 감정을 분석하고 공유하세요" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://facereview-api.winterholic.net" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Async font loading (non-render-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"
      media="print"
      onload="this.media = 'all'" />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    </noscript>

    <title>FaceReview - 감정 리뷰 영상 플랫폼</title>
  </head>
  <body>
    <noscript>이 서비스를 이용하려면 JavaScript를 활성화해야 합니다.</noscript>
    <div id="root"></div>
    <div id="loading-start" aria-hidden="true"></div>
    <div id="loading-end" aria-hidden="true"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
