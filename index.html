<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#15151d" />
    <meta
      name="description"
      content="FaceReview - 영상을 보며 느끼는 감정을 분석하고 공유하세요" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to critical origins (max 4) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://img.youtube.com" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <!-- DNS prefetch for secondary origins -->
    <link rel="dns-prefetch" href="https://facereview-api.winterholic.net" />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Async font loading (non-render-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"
      />
    </noscript>

    <title>FaceReview</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="loading-start"></div>
    <div id="loading-end"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
