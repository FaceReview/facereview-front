# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Hide nginx version
    server_tokens off;

    # Allow large request bodies (e.g. profile image uploads)
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    # index.html must never be cached so new deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://facereview-api.winterholic.net wss://facereview-api.winterholic.net; script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data: https: blob:; media-src 'self' blob:; object-src 'none'; base-uri 'self';" always;
    }

    # --- Static assets (long-term cache; filenames are content-hashed by Vite) ---
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- SPA fallback ---
    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy ---
    location /api/ {
        proxy_pass https://facereview-api.winterholic.net/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host facereview-api.winterholic.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Socket.io proxy ---
    location /socket.io/ {
        proxy_pass https://facereview-api.winterholic.net;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_ssl_server_name on;
        proxy_set_header Host facereview-api.winterholic.net;
        proxy_set_header X-Real-IP $remote_addr;
        # Keep WebSocket connections alive for a long time
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
